<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FUBOL</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; display: flex; flex-direction: column; }
    header {
      background: #1a1f2e; border-bottom: 2px solid #2d6a4f;
      padding: 12px 20px; display: flex; align-items: center; gap: 12px; flex-shrink: 0;
    }
    header a { color: #4ade80; text-decoration: none; font-size: 0.9rem; font-weight: 600; }
    header h2 { font-size: 1rem; color: #e2e8f0; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* El iframe ocupa todo el espacio restante */
    .player-container {
      flex: 1;
      position: relative;
    }
    .player-container iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
    }
  </style>
</head>
<body>

<header>
  <a href="/">← Volver</a>
  <h2 id="titulo">Cargando...</h2>
</header>

<div class="player-container">
  <iframe
    id="player"
    allowfullscreen
    allow="autoplay; fullscreen; picture-in-picture"
    referrerpolicy="no-referrer-when-downgrade">
  </iframe>
</div>

<script>
const url = new URLSearchParams(location.search).get('url');

if (url) {
  // Título desde el stream name
  try {
    const decoded = atob(new URL(url).searchParams.get('r') || '');
    const stream = new URL(decoded).searchParams.get('stream') || '';
    document.getElementById('titulo').textContent = stream.toUpperCase().replace(/[_-]/g, ' ') || 'En vivo';
  } catch {
    document.getElementById('titulo').textContent = 'En vivo';
  }

  document.getElementById('player').src = url;
} else {
  document.getElementById('titulo').textContent = 'Error: sin URL';
}

// Interceptar cualquier intento del iframe de redirigir la página principal
window.addEventListener('beforeunload', (e) => {
  if (document.activeElement === document.getElementById('player')) {
    e.preventDefault();
    return '';
  }
});

// Bloquear window.open desde el iframe (los popups de ads)
window.open = () => null;
</script>
</body>
</html>
