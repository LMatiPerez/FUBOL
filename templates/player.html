<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FUBOL</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f1117; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
    header { background: #1a1f2e; border-bottom: 2px solid #2d6a4f; padding: 12px 20px; display: flex; align-items: center; gap: 12px; }
    header a { color: #4ade80; text-decoration: none; font-size: .9rem; font-weight: 600; }
    header h2 { font-size: 1rem; flex: 1; }
    main { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; padding: 40px 16px; }
    #msg { font-size: .95rem; color: #9ca3af; text-align: center; }
    #msg.error { color: #fca5a5; }
    .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid #4ade80;
      border-top-color: transparent; border-radius: 50%; animation: spin .8s linear infinite;
      vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<header>
  <a href="/">← Volver</a>
  <h2 id="titulo">Buscando stream...</h2>
</header>
<main>
  <div id="msg"><span class="spinner"></span>Extrayendo stream, esperá unos segundos...</div>
</main>

<script>
const eventoUrl = new URLSearchParams(location.search).get('url');

// Título desde la URL
try {
  const decoded = atob(new URL(eventoUrl).searchParams.get('r') || '');
  const stream = new URL(decoded).searchParams.get('stream') || '';
  document.getElementById('titulo').textContent = stream.toUpperCase().replace(/[_-]/g, ' ') || 'En vivo';
} catch { document.getElementById('titulo').textContent = 'En vivo'; }

async function buscarStream() {
  try {
    const resp = await fetch('/api/stream?url=' + encodeURIComponent(eventoUrl));
    const data = await resp.json();

    const titulo = document.getElementById('titulo').textContent;

    if (data.m3u8) {
      // Player limpio con HLS.js + proxy
      window.location.replace('/player?stream=' + encodeURIComponent(data.m3u8) + '&titulo=' + encodeURIComponent(titulo));
      return;
    }

    if (data.iframe) {
      const fallbackUrl = eventoUrl.includes('pelotalibretv.su/eventos/')
        ? eventoUrl
        : data.iframe;

      // Fallback: mostrar el origen cuando conviene conservar el referer
      document.getElementById('msg').textContent = '';
      document.body.innerHTML = `
        <style>* {margin:0;padding:0;box-sizing:border-box} body {background:#000;display:flex;flex-direction:column;height:100vh}</style>
        <div style="background:#1a1f2e;padding:10px 16px;display:flex;align-items:center;gap:12px;border-bottom:2px solid #2d6a4f">
          <a href="/" style="color:#4ade80;text-decoration:none;font-weight:600;font-size:.9rem">← Volver</a>
          <span style="color:#e2e8f0;font-size:.95rem">${titulo}</span>
        </div>
        <iframe src="${fallbackUrl}" style="flex:1;border:none;width:100%" allowfullscreen allow="autoplay;fullscreen"></iframe>
      `;
      return;
    }

    document.getElementById('msg').className = 'error';
    document.getElementById('msg').textContent = 'No se encontró stream. Puede que el partido no haya empezado aún.';

  } catch(e) {
    document.getElementById('msg').className = 'error';
    document.getElementById('msg').textContent = 'Error: ' + e.message;
  }
}

if (eventoUrl) buscarStream();
else {
  document.getElementById('msg').className = 'error';
  document.getElementById('msg').textContent = 'Sin URL de partido.';
}
</script>
</body>
</html>
