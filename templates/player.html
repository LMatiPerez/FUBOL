<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FUBOL</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f1117;
      color: #e2e8f0;
      font-family: "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #1a1f2e;
      border-bottom: 2px solid #2d6a4f;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header a {
      color: #4ade80;
      text-decoration: none;
      font-size: .9rem;
      font-weight: 600;
    }
    header h2 {
      font-size: 1rem;
      flex: 1;
    }
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
      padding: 40px 16px;
    }
    #msg {
      font-size: .95rem;
      color: #9ca3af;
      text-align: center;
      max-width: 640px;
      line-height: 1.5;
    }
    #msg.error { color: #fca5a5; }
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid #4ade80;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin .8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<header>
  <a href="/">Volver</a>
  <h2 id="titulo">Buscando stream...</h2>
</header>
<main>
  <div id="msg"><span class="spinner"></span>Extrayendo stream, espera unos segundos...</div>
</main>

<script>
const eventoUrl = new URLSearchParams(location.search).get("url");

if (!eventoUrl) {
  setError("Sin URL de partido.");
} else {
  buscarStream(eventoUrl);
}

function decodificarStream(url) {
  try {
    const encoded = new URL(url).searchParams.get("r") || "";
    const decoded = atob(encoded.replace(/-/g, "+").replace(/_/g, "/"));
    return new URL(decoded).searchParams.get("stream") || "";
  } catch {
    return "";
  }
}

function tituloDesdeStream(stream) {
  return (stream || "").toUpperCase().replace(/[_-]/g, " ") || "En vivo";
}

async function buscarStream(url) {
  const streamDecodificado = decodificarStream(url);
  const titulo = tituloDesdeStream(streamDecodificado);
  document.getElementById("titulo").textContent = titulo;

  try {
    const resp = await fetch("/api/stream?url=" + encodeURIComponent(url));
    const data = await resp.json();

    if (!resp.ok || !data.ok) {
      throw new Error(data.error || `HTTP ${resp.status}`);
    }

    if (data.m3u8) {
      window.location.replace(
        "/player?stream=" + encodeURIComponent(data.m3u8) +
        "&titulo=" + encodeURIComponent(titulo)
      );
      return;
    }

    if (data.iframe) {
      const iframeStream = extraerStreamDesdeUrl(data.iframe) || streamDecodificado;
      if (iframeStream) {
        window.location.replace(
          "/canal?stream=" + encodeURIComponent(iframeStream) +
          "&titulo=" + encodeURIComponent(tituloDesdeStream(iframeStream))
        );
        return;
      }
    }

    if (streamDecodificado) {
      window.location.replace(
        "/canal?stream=" + encodeURIComponent(streamDecodificado) +
        "&titulo=" + encodeURIComponent(titulo)
      );
      return;
    }

    setError("No se encontro un stream reproducible para este partido.");
  } catch (error) {
    setError("Error: " + (error.message || error));
  }
}

function extraerStreamDesdeUrl(url) {
  try {
    return new URL(url, location.origin).searchParams.get("stream") || "";
  } catch {
    return "";
  }
}

function setError(msg) {
  document.getElementById("msg").className = "error";
  document.getElementById("msg").textContent = msg;
}
</script>
</body>
</html>
